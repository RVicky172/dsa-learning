services:
  postgres:
    image: postgres:16-alpine
    container_name: dsa-learning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dsa_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - dsa_learning_postgres_data:/var/lib/postgresql/data

volumes:
  dsa_learning_postgres_data:
