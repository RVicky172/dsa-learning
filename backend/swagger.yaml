openapi: 3.0.0
info:
  title: DSA Learning Backend API
  description: API documentation for the DSA Learning backend.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /users/me:
    get:
      summary: Get current user details
      description: Retrieve details of the currently authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                  display_name:
                    type: string
        '401':
          description: Unauthorized
  /topics:
    get:
      summary: Get all topics
      description: Retrieve a list of all topics.
      responses:
        '200':
          description: Topics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    slug:
                      type: string
                    title:
                      type: string
                    description:
                      type: string
        '500':
          description: Internal server error
  /payments/webhook:
    post:
      summary: Handle payment webhook
      description: Process payment webhook events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                data:
                  type: object
                  properties:
                    providerPaymentId:
                      type: string
      responses:
        '200':
          description: Webhook processed successfully
        '400':
          description: Invalid webhook payload
  /subscriptions/me:
    get:
      summary: Get current subscription details
      description: Retrieve subscription details of the currently authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Subscription details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan_id:
                    type: string
                  status:
                    type: string
                  current_period_end:
                    type: string
                    nullable: true
        '401':
          description: Unauthorized
  /progress:
    get:
      summary: Get user progress
      description: Retrieve progress details for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Progress details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  topic_id:
                    type: string
                  attempted_count:
                    type: integer
                  solved_count:
                    type: integer
                  mastery_score:
                    type: number
        '401':
          description: Unauthorized
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT