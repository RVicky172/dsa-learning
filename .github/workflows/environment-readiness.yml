name: Environment Readiness

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Environment target"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - staging
          - production
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read
  actions: read

jobs:
  validate:
    name: Validate ${{ matrix.environment }} readiness
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: staging
            requiresReviewers: false
            requiredSecrets: |
              STAGING_BACKEND_DEPLOY_HOOK
              STAGING_FRONTEND_DEPLOY_HOOK
              STAGING_BACKEND_HEALTH_URL
              STAGING_FRONTEND_URL
              STAGING_DATABASE_URL
              STAGING_MONITOR_BACKEND_HEALTH_URL
              STAGING_MONITOR_FRONTEND_URL
              STAGING_ALERT_WEBHOOK_URL
          - environment: production
            requiresReviewers: true
            requiredSecrets: |
              PRODUCTION_BACKEND_DEPLOY_HOOK
              PRODUCTION_FRONTEND_DEPLOY_HOOK
              PRODUCTION_BACKEND_HEALTH_URL
              PRODUCTION_FRONTEND_URL
              PRODUCTION_DATABASE_URL
              PRODUCTION_MONITOR_BACKEND_HEALTH_URL
              PRODUCTION_MONITOR_FRONTEND_URL
              PRODUCTION_ALERT_WEBHOOK_URL
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'both' || inputs.target == matrix.environment))
    steps:
      - name: Validate environment and secret wiring
        uses: actions/github-script@v7
        env:
          TARGET_ENV: ${{ matrix.environment }}
          REQUIRES_REVIEWERS: ${{ matrix.requiresReviewers }}
          REQUIRED_SECRETS: ${{ matrix.requiredSecrets }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const envName = process.env.TARGET_ENV;
            const requiresReviewers = process.env.REQUIRES_REVIEWERS === 'true';

            const requiredSecrets = (process.env.REQUIRED_SECRETS || '')
              .split('\n')
              .map((name) => name.trim())
              .filter(Boolean);

            const requiredRepoVariables = ['RUN_DB_MIGRATIONS'];

            const envResponse = await github.request(
              'GET /repos/{owner}/{repo}/environments/{environment_name}',
              { owner, repo, environment_name: envName },
            );

            const envSecrets = await github.paginate(
              'GET /repos/{owner}/{repo}/environments/{environment_name}/secrets',
              { owner, repo, environment_name: envName, per_page: 100 },
              (response) => response.data.secrets.map((secret) => secret.name),
            );

            const repoVariables = await github.paginate(
              'GET /repos/{owner}/{repo}/actions/variables',
              { owner, repo, per_page: 100 },
              (response) => response.data.variables.map((variable) => variable.name),
            );

            const missingSecrets = requiredSecrets.filter((name) => !envSecrets.includes(name));
            const missingRepoVariables = requiredRepoVariables.filter((name) => !repoVariables.includes(name));

            const protectionRules = envResponse.data.protection_rules || [];
            const hasReviewerRule = protectionRules.some((rule) => rule.type === 'required_reviewers');
            const missingProtection = requiresReviewers && !hasReviewerRule;

            const summaryLines = [
              `## ${envName} environment readiness`,
              '',
              `- Environment exists: yes`,
              `- Secrets configured: ${envSecrets.length}`,
              `- Repository variables configured: ${repoVariables.length}`,
              `- Required reviewer protection present: ${hasReviewerRule ? 'yes' : 'no'}`,
              '',
            ];

            if (missingSecrets.length > 0) {
              summaryLines.push('### Missing environment secrets');
              missingSecrets.forEach((name) => summaryLines.push(`- ${name}`));
              summaryLines.push('');
            }

            if (missingRepoVariables.length > 0) {
              summaryLines.push('### Missing repository variables');
              missingRepoVariables.forEach((name) => summaryLines.push(`- ${name}`));
              summaryLines.push('');
            }

            if (missingProtection) {
              summaryLines.push('### Missing required protection rules');
              summaryLines.push('- required_reviewers');
              summaryLines.push('');
            }

            if (missingSecrets.length === 0 && missingRepoVariables.length === 0 && !missingProtection) {
              summaryLines.push('All required deployment and monitoring wiring checks passed.');
            }

            core.summary.addRaw(summaryLines.join('\n')).write();

            if (missingSecrets.length > 0 || missingRepoVariables.length > 0 || missingProtection) {
              core.setFailed(
                `Environment readiness failed for ${envName}. Missing secrets: ${missingSecrets.length}, missing repo variables: ${missingRepoVariables.length}, missing protection rules: ${missingProtection ? 1 : 0}.`,
              );
            }