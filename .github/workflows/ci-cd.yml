name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deployment target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frontend_checks:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend_checks:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [frontend_checks, backend_checks]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'staging')
    environment: staging
    env:
      BACKEND_DEPLOY_HOOK: ${{ secrets.STAGING_BACKEND_DEPLOY_HOOK }}
      FRONTEND_DEPLOY_HOOK: ${{ secrets.STAGING_FRONTEND_DEPLOY_HOOK }}
      BACKEND_HEALTH_URL: ${{ secrets.STAGING_BACKEND_HEALTH_URL }}
      FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      RUN_DB_MIGRATIONS: ${{ vars.RUN_DB_MIGRATIONS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate staging secrets
        run: |
          set -euo pipefail
          [[ -n "$BACKEND_DEPLOY_HOOK" ]] || { echo "Missing STAGING_BACKEND_DEPLOY_HOOK"; exit 1; }
          [[ -n "$FRONTEND_DEPLOY_HOOK" ]] || { echo "Missing STAGING_FRONTEND_DEPLOY_HOOK"; exit 1; }
          [[ -n "$BACKEND_HEALTH_URL" ]] || { echo "Missing STAGING_BACKEND_HEALTH_URL"; exit 1; }
          [[ -n "$FRONTEND_URL" ]] || { echo "Missing STAGING_FRONTEND_URL"; exit 1; }

      - name: Setup Node for migration (optional)
        if: ${{ env.RUN_DB_MIGRATIONS == 'true' && env.DATABASE_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Run staging DB migrations (optional)
        if: ${{ env.RUN_DB_MIGRATIONS == 'true' && env.DATABASE_URL != '' }}
        working-directory: backend
        run: |
          npm ci
          npm run migrate

      - name: Trigger backend staging deploy
        run: curl --fail --show-error --silent -X POST "$BACKEND_DEPLOY_HOOK"

      - name: Trigger frontend staging deploy
        run: curl --fail --show-error --silent -X POST "$FRONTEND_DEPLOY_HOOK"

      - name: Staging smoke checks
        run: |
          curl --fail --show-error --silent "$BACKEND_HEALTH_URL"
          curl --fail --show-error --silent "$FRONTEND_URL"

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [frontend_checks, backend_checks]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'production')
    environment: production
    env:
      BACKEND_DEPLOY_HOOK: ${{ secrets.PRODUCTION_BACKEND_DEPLOY_HOOK }}
      FRONTEND_DEPLOY_HOOK: ${{ secrets.PRODUCTION_FRONTEND_DEPLOY_HOOK }}
      BACKEND_HEALTH_URL: ${{ secrets.PRODUCTION_BACKEND_HEALTH_URL }}
      FRONTEND_URL: ${{ secrets.PRODUCTION_FRONTEND_URL }}
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      RUN_DB_MIGRATIONS: ${{ vars.RUN_DB_MIGRATIONS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production secrets
        run: |
          set -euo pipefail
          [[ -n "$BACKEND_DEPLOY_HOOK" ]] || { echo "Missing PRODUCTION_BACKEND_DEPLOY_HOOK"; exit 1; }
          [[ -n "$FRONTEND_DEPLOY_HOOK" ]] || { echo "Missing PRODUCTION_FRONTEND_DEPLOY_HOOK"; exit 1; }
          [[ -n "$BACKEND_HEALTH_URL" ]] || { echo "Missing PRODUCTION_BACKEND_HEALTH_URL"; exit 1; }
          [[ -n "$FRONTEND_URL" ]] || { echo "Missing PRODUCTION_FRONTEND_URL"; exit 1; }

      - name: Setup Node for migration (optional)
        if: ${{ env.RUN_DB_MIGRATIONS == 'true' && env.DATABASE_URL != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Run production DB migrations (optional)
        if: ${{ env.RUN_DB_MIGRATIONS == 'true' && env.DATABASE_URL != '' }}
        working-directory: backend
        run: |
          npm ci
          npm run migrate

      - name: Trigger backend production deploy
        run: curl --fail --show-error --silent -X POST "$BACKEND_DEPLOY_HOOK"

      - name: Trigger frontend production deploy
        run: curl --fail --show-error --silent -X POST "$FRONTEND_DEPLOY_HOOK"

      - name: Production smoke checks
        run: |
          curl --fail --show-error --silent "$BACKEND_HEALTH_URL"
          curl --fail --show-error --silent "$FRONTEND_URL"
